<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YesChef! — Austin Eating Guide</title>
<meta name="description" content="10 food categories, 90 restaurants, zero bad meals. A curated eating guide for your Austin trip.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN SYSTEM
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-base:#0A0A0A;
  --bg-card:#141414;
  --bg-card-hover:#1A1A1A;
  --bg-surface:#111111;
  --border:#1E1E1E;
  --border-light:#2A2A2A;
  --accent:#C84B31;
  --accent-dim:#C84B3133;
  --accent-glow:#C84B3155;
  --text-primary:#F0EDE6;
  --text-secondary:#9A9590;
  --text-muted:#5A5550;
  --text-dim:#4A4540;
  --serif:'Instrument Serif',Georgia,serif;
  --sans:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --radius:16px;
  --radius-sm:8px;
  --radius-xs:4px;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);
  background:var(--bg-base);
  color:var(--text-primary);
  line-height:1.6;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ============================================================
   HEADER
   ============================================================ */
.site-header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,10,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 24px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{font-family:var(--serif);font-size:1.5rem;font-weight:400;letter-spacing:-0.02em}
.logo span{color:var(--accent)}
.city-nav{display:flex;gap:8px;font-size:0.85rem}
.city-nav a{
  color:var(--text-muted);transition:all .2s;
  padding:6px 16px;border-radius:20px;border:1px solid transparent;
}
.city-nav a.active{color:var(--text-primary);border-color:var(--border-light)}
.city-nav a:hover{color:var(--text-secondary)}
.back-btn{
  display:none;align-items:center;gap:6px;
  font-size:0.85rem;color:var(--text-secondary);
  transition:color .2s;cursor:pointer;
}
.back-btn:hover{color:var(--text-primary)}
.back-btn svg{width:16px;height:16px}

/* ============================================================
   HERO
   ============================================================ */
.hero{
  max-width:1200px;margin:0 auto;
  padding:80px 24px 48px;text-align:left;
}
.hero h1{
  font-family:var(--serif);font-size:clamp(2.5rem,8vw,5.5rem);
  font-weight:400;line-height:1.05;letter-spacing:-0.03em;
  margin-bottom:20px;
}
.hero .hero-city{display:block;color:var(--accent);font-style:italic}
.hero h1 em{font-style:italic;color:var(--accent)}
.hero p{
  font-size:1.05rem;color:var(--text-secondary);
  line-height:1.7;max-width:540px;
}

/* ============================================================
   CATEGORY GRID (Landing)
   ============================================================ */
.section-landing{max-width:1200px;margin:0 auto;padding:0 24px 80px}
.category-grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:16px;
}
.category-card{
  position:relative;border-radius:var(--radius);
  overflow:hidden;cursor:pointer;
  background:var(--bg-card);border:1px solid var(--border);
  transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease;
  opacity:0;transform:translateY(20px);
  animation:fadeInUp .5s ease forwards;
}
.category-card:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 40px rgba(0,0,0,0.4);
  border-color:var(--border-light);
}
.category-card-img{
  width:100%;aspect-ratio:16/10;object-fit:cover;
  filter:brightness(0.7);transition:filter .3s ease;
}
.category-card:hover .category-card-img{filter:brightness(0.85)}
.category-card-body{padding:16px 18px 18px}
.category-card-name{
  font-family:var(--serif);font-size:1.35rem;
  font-weight:400;margin-bottom:4px;
}
.category-card-tagline{
  font-size:0.82rem;color:var(--text-secondary);
  margin-bottom:8px;line-height:1.4;
}
.category-card-count{
  font-size:0.72rem;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.08em;
  font-weight:500;
}

/* ============================================================
   CATEGORY PAGE
   ============================================================ */
.section-category{
  display:none;max-width:1100px;margin:0 auto;padding:0 24px 80px;
}
.section-category.active{display:block}
.cat-hero{max-width:720px;margin:0 auto 48px;padding-top:40px}
.cat-hero h2{
  font-family:var(--serif);font-size:clamp(2rem,5vw,3rem);
  font-weight:400;line-height:1.15;margin-bottom:24px;
  letter-spacing:-0.02em;
}
.cat-editorial{
  font-size:0.95rem;color:var(--text-secondary);
  line-height:1.8;white-space:pre-line;
}
.cat-editorial p{margin-bottom:16px}
.restaurant-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:18px;
}
.restaurant-card{
  position:relative;border-radius:var(--radius);overflow:hidden;
  background:var(--bg-card);border:1px solid var(--border);
  cursor:pointer;
  transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease;
  opacity:0;transform:translateY(20px);
}
.restaurant-card.visible{animation:fadeInUp .5s ease forwards}
.restaurant-card:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 40px rgba(0,0,0,0.4);
  border-color:var(--border-light);
}
.rest-card-img-wrap{position:relative;width:100%;aspect-ratio:16/11;overflow:hidden}
.rest-card-img{
  width:100%;height:100%;object-fit:cover;
  filter:brightness(0.8);transition:filter .3s ease;
}
.restaurant-card:hover .rest-card-img{filter:brightness(0.95)}
.badge-rank{
  position:absolute;top:10px;left:10px;
  background:rgba(10,10,10,0.85);
  color:var(--text-primary);font-size:0.7rem;
  font-weight:600;letter-spacing:0.05em;
  padding:4px 8px;border-radius:var(--radius-xs);
}
.badge-score{
  position:absolute;top:10px;right:10px;
  background:var(--accent);color:#fff;
  font-size:0.75rem;font-weight:700;
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.rest-card-body{padding:14px 16px 16px}
.rest-card-name{
  font-family:var(--serif);font-size:1.1rem;
  font-weight:400;margin-bottom:4px;line-height:1.25;
}
.rest-card-meta{
  font-size:0.78rem;color:var(--text-muted);margin-bottom:8px;
}
.rest-card-tags{
  display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;
}
.rest-card-tag{
  font-size:0.65rem;text-transform:uppercase;
  letter-spacing:0.06em;font-weight:500;
  color:var(--text-muted);background:var(--bg-base);
  padding:3px 8px;border-radius:var(--radius-xs);
}
.rest-card-hook{
  font-size:0.82rem;color:var(--text-secondary);
  line-height:1.5;
}

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;
  transition:opacity .3s ease;
}
.modal-overlay.active{opacity:1;pointer-events:auto}
.modal-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:201;
  max-height:92vh;overflow-y:auto;
  background:var(--bg-base);
  border-radius:var(--radius) var(--radius) 0 0;
  transform:translateY(100%);
  pointer-events:none;
  transition:transform .35s cubic-bezier(.22,1,.36,1);
}
.modal-panel.active{transform:translateY(0);pointer-events:auto}
.modal-hero-img{
  width:100%;aspect-ratio:16/9;object-fit:cover;
  border-radius:var(--radius) var(--radius) 0 0;
}
.modal-hero-wrap{position:relative}
.modal-close{
  position:absolute;top:16px;left:16px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(10,10,10,0.7);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:1.2rem;
  transition:background .2s;z-index:5;
}
.modal-close:hover{background:rgba(10,10,10,0.9)}
.modal-score{
  position:absolute;top:16px;right:16px;
  background:var(--accent);color:#fff;
  font-size:1rem;font-weight:700;
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  z-index:5;
}
.modal-body{padding:28px 24px 40px;max-width:640px;margin:0 auto}
.modal-name{
  font-family:var(--serif);font-size:1.8rem;
  font-weight:400;line-height:1.2;margin-bottom:6px;
}
.modal-address{
  font-size:0.85rem;color:var(--text-muted);margin-bottom:16px;
}
.modal-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.modal-tag{
  font-size:0.72rem;text-transform:uppercase;
  letter-spacing:0.06em;font-weight:500;
  padding:5px 12px;border-radius:20px;
}
.modal-tag.cuisine{background:var(--accent-dim);color:var(--accent)}
.modal-tag.vibe{background:var(--bg-card);color:var(--text-secondary);border:1px solid var(--border)}
.modal-perfect{
  font-size:0.85rem;color:var(--text-secondary);
  margin-bottom:20px;
}
.modal-perfect strong{color:var(--text-primary);font-weight:500}
.modal-editorial{
  font-size:0.95rem;color:var(--text-secondary);
  line-height:1.8;margin-bottom:24px;
  padding-left:16px;border-left:3px solid var(--accent);
}
.modal-dontmiss{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:16px 18px;
  margin-bottom:28px;
}
.modal-dontmiss-label{
  font-size:0.7rem;text-transform:uppercase;
  letter-spacing:0.08em;font-weight:600;
  color:var(--accent);margin-bottom:6px;
}
.modal-dontmiss-text{
  font-size:0.9rem;color:var(--text-primary);line-height:1.5;
}
.modal-actions{display:flex;gap:10px;flex-wrap:wrap}
.modal-btn{
  flex:1;min-width:120px;padding:12px 16px;
  border-radius:var(--radius-sm);font-size:0.85rem;
  font-weight:600;text-align:center;
  transition:all .2s ease;display:inline-flex;
  align-items:center;justify-content:center;gap:6px;
}
.modal-btn.primary{background:var(--accent);color:#fff}
.modal-btn.primary:hover{background:#d9593f}
.modal-btn.secondary{background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border)}
.modal-btn.secondary:hover{border-color:var(--border-light);background:var(--bg-card-hover)}

/* ============================================================
   FOOTER
   ============================================================ */
.site-footer{
  text-align:center;padding:40px 24px;
  border-top:1px solid var(--border);
  font-size:0.8rem;color:var(--text-dim);
}

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{
  from{opacity:0}to{opacity:1}
}

/* ============================================================
   RESPONSIVE — DESKTOP (1024+)
   ============================================================ */
@media(min-width:1024px){
  .site-header{padding:0 48px;height:64px}
  .logo{font-size:1.65rem}
  .hero{padding:100px 48px 56px;max-width:1200px}
  .hero h1{font-size:5.5rem}
  .hero .hero-city{font-size:0.45em}
  .hero p{font-size:1.15rem}
  .section-landing{max-width:1200px;padding:0 48px 100px}
  .category-grid{grid-template-columns:repeat(3,1fr);gap:20px}
  .category-card-img{aspect-ratio:16/9}
  .category-card-body{padding:20px 22px 22px}
  .category-card-name{font-size:1.5rem}
  .category-card-tagline{font-size:0.88rem}
  .section-category{max-width:1200px;padding:0 48px 100px}
  .cat-hero{max-width:780px;padding-top:56px;margin-bottom:56px}
  .cat-hero h2{font-size:3.2rem}
  .cat-editorial{font-size:1rem;columns:2;column-gap:40px}
  .cat-editorial p{break-inside:avoid}
  .restaurant-grid{grid-template-columns:repeat(3,1fr);gap:22px}
  .rest-card-body{padding:16px 18px 20px}
  .rest-card-name{font-size:1.15rem}
  .rest-card-hook{font-size:0.85rem}
  /* Desktop modal — centered panel */
  .modal-panel{
    bottom:auto;top:50%;left:50%;right:auto;
    transform:translate(-50%,-50%) scale(0.95);
    opacity:0;
    width:640px;max-height:88vh;
    border-radius:var(--radius);
  }
  .modal-panel.active{
    transform:translate(-50%,-50%) scale(1);
    opacity:1;pointer-events:auto;
  }
  .modal-hero-img{border-radius:var(--radius) var(--radius) 0 0}
}

/* ============================================================
   RESPONSIVE — TABLET (601–1023)
   ============================================================ */
@media(max-width:1023px) and (min-width:601px){
  .restaurant-grid{grid-template-columns:repeat(2,1fr);gap:16px}
  .category-grid{gap:16px}
  .section-landing{max-width:800px}
  .modal-panel{max-height:90vh}
}

/* ============================================================
   RESPONSIVE — MOBILE (≤600)
   ============================================================ */
@media(max-width:600px){
  .site-header{padding:0 16px;height:56px}
  .logo{font-size:1.3rem}
  .hero{padding:40px 20px 28px}
  .hero h1{font-size:2rem}
  .hero p{font-size:0.92rem}
  .section-landing{padding:0 16px 60px}
  .category-grid{grid-template-columns:1fr;gap:12px}
  .category-card{display:flex;flex-direction:row;align-items:stretch}
  .category-card-img{
    aspect-ratio:1/1;width:110px;min-height:100%;
    flex-shrink:0;border-radius:var(--radius) 0 0 var(--radius);
  }
  .category-card-body{
    padding:14px 16px;display:flex;flex-direction:column;justify-content:center;
  }
  .category-card-name{font-size:1.1rem;margin-bottom:2px}
  .category-card-tagline{font-size:0.78rem;margin-bottom:4px}
  .category-card-count{font-size:0.68rem}
  .section-category{padding:0 16px 60px}
  .cat-hero{padding-top:20px;margin-bottom:28px}
  .cat-hero h2{font-size:1.8rem;margin-bottom:16px}
  .cat-editorial{font-size:0.88rem;line-height:1.7}
  .restaurant-grid{grid-template-columns:1fr;gap:14px}
  .restaurant-card{display:flex;flex-direction:row;align-items:stretch}
  .rest-card-img-wrap{
    width:120px;min-height:100%;flex-shrink:0;aspect-ratio:auto;
  }
  .rest-card-img{border-radius:var(--radius) 0 0 var(--radius)}
  .badge-rank{top:6px;left:6px;font-size:0.6rem;padding:3px 6px}
  .badge-score{top:6px;right:auto;left:6px;top:auto;bottom:6px;width:30px;height:30px;font-size:0.65rem}
  .rest-card-body{
    padding:12px 14px;display:flex;flex-direction:column;justify-content:center;
  }
  .rest-card-name{font-size:0.95rem;margin-bottom:2px}
  .rest-card-meta{font-size:0.72rem;margin-bottom:4px}
  .rest-card-tags{display:none}
  .rest-card-hook{font-size:0.78rem;line-height:1.4;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .modal-panel{max-height:95vh;border-radius:12px 12px 0 0}
  .modal-body{padding:20px 18px 32px}
  .modal-name{font-size:1.4rem}
  .modal-address{font-size:0.8rem}
  .modal-editorial{font-size:0.88rem;line-height:1.7}
  .modal-actions{flex-direction:column}
  .modal-btn{min-width:unset;padding:14px 16px}
  .site-footer{padding:28px 16px;font-size:0.75rem}
}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-base)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}
</style>
</head>

</div>

<!-- CATEGORY PANELS (generated by JS) -->

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>

    <img class="modal-hero-img" id="modalImg" src="" alt="">

  </div>
  <div class="modal-body">
    <h3 class="modal-name" id="modalName"></h3>
    <p class="modal-address" id="modalAddress"></p>
    <div class="modal-tags" id="modalTags"></div>

  </div>
</div>

<!-- FOOTER -->
<footer class="site-footer">
  YesChef! Austin — A curated eating guide. Data verified March 2026.<br>
  Built by humans who eat here.
</footer>

<script>
// ============================================================
// APP
// ============================================================
(function(){
  const data = typeof YESCHEF_DATA !== 'undefined' ? YESCHEF_DATA : null;
  if(!data){document.body.innerHTML='<p style="padding:40px;color:red">Error: data not loaded</p>';return}

  const landing = document.getElementById('landing');
  const categoryPanels = document.getElementById('categoryPanels');
  const categoryGrid = document.getElementById('categoryGrid');
  const backBtn = document.getElementById('backBtn');
  const modalOverlay = document.getElementById('modalOverlay');
  const modalPanel = document.getElementById('modalPanel');

  let currentCategory = null;

  // — Build category grid on landing —
  data.categories.forEach((cat,i) => {
    const card = document.createElement('div');
    card.className = 'category-card';
    card.style.animationDelay = (i * 60) + 'ms';
    card.onclick = () => showCategory(cat.id);
    card.innerHTML = `
      <img class="category-card-img" src="${cat.image}" alt="${cat.name}" loading="lazy">
      <div class="category-card-body">
        <div class="category-card-name">${cat.name}</div>
        <div class="category-card-tagline">${cat.tagline}</div>
        <div class="category-card-count">${cat.restaurants.length} restaurants</div>
      </div>
    `;
    categoryGrid.appendChild(card);
  });

  // — Build category panels —
  data.categories.forEach(cat => {
    const section = document.createElement('section');
    section.className = 'section-category';
    section.id = 'cat-' + cat.id;

    const editorialParas = cat.editorial.split('\n\n').map(p=>`<p>${p.trim()}</p>`).join('');

    let restaurantCards = '';
    cat.restaurants.forEach((r,i) => {
      const tags = r.cuisine_tags.map(t=>`<span class="rest-card-tag">${t}</span>`).join('');
      restaurantCards += `
        <div class="restaurant-card" data-delay="${i*50}" onclick='openModal(${JSON.stringify(r).replace(/'/g,"&#39;")})'>
          <div class="rest-card-img-wrap">
            <img class="rest-card-img" src="${r.image}" alt="${r.name}" loading="lazy">
            <div class="badge-rank">#${r.rank}</div>
            <div class="badge-score">${r.score}</div>
          </div>
          <div class="rest-card-body">
            <div class="rest-card-name">${r.name}</div>
            <div class="rest-card-meta">${r.neighborhood} · ${r.price}</div>
            <div class="rest-card-tags">${tags}</div>
            <div class="rest-card-hook">${r.hook}</div>
          </div>
        </div>
      `;
    });

    section.innerHTML = `
      <div class="cat-hero">
        <h2>${cat.name}</h2>
        <div class="cat-editorial">${editorialParas}</div>
      </div>
      <div class="restaurant-grid">${restaurantCards}</div>
    `;
    categoryPanels.appendChild(section);
  });

  // — Navigation —
  window.showLanding = function(){
    landing.style.display = '';
    document.querySelectorAll('.section-category').forEach(s=>s.classList.remove('active'));
    backBtn.style.display = 'none';
    currentCategory = null;
    window.scrollTo({top:0,behavior:'smooth'});
  };

  window.showCategory = function(id){
    landing.style.display = 'none';
    document.querySelectorAll('.section-category').forEach(s=>s.classList.remove('active'));
    const panel = document.getElementById('cat-'+id);
    if(panel){
      panel.classList.add('active');
      backBtn.style.display = 'flex';
      currentCategory = id;
      window.scrollTo({top:0});
      // Staggered animation for restaurant cards
      const cards = panel.querySelectorAll('.restaurant-card');
      cards.forEach((card,i)=>{
        card.style.animationDelay = (i*50)+'ms';
        card.classList.remove('visible');
        requestAnimationFrame(()=>{
          requestAnimationFrame(()=>{
            card.classList.add('visible');
          });
        });
      });
    }
  };

  // — Modal —
  window.openModal = function(r){
    document.getElementById('modalImg').src = r.image;
    document.getElementById('modalScore').textContent = r.score;
    document.getElementById('modalName').textContent = r.name;
    document.getElementById('modalAddress').textContent = r.address;
    document.getElementById('modalEditorial').textContent = r.editorial;
    document.getElementById('modalDontMiss').textContent = r.dont_miss;

    // Tags
    const tagsEl = document.getElementById('modalTags');
    tagsEl.innerHTML = '';
    r.cuisine_tags.forEach(t=>{
      tagsEl.innerHTML += `<span class="modal-tag cuisine">${t}</span>`;
    });
    r.perfect_for.forEach(t=>{
      tagsEl.innerHTML += `<span class="modal-tag vibe">${t}</span>`;
    });

    // Perfect for
    document.getElementById('modalPerfect').innerHTML =
      '<strong>Perfect for:</strong> ' + r.perfect_for.join(' · ');

    // Actions
    const actionsEl = document.getElementById('modalActions');
    const websiteUrl = r.website || '#';
    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.name+' '+r.address)}`;
    actionsEl.innerHTML = `
      <a href="${websiteUrl}" target="_blank" rel="noopener" class="modal-btn primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
        Website
      </a>
      <a href="${mapsUrl}" target="_blank" rel="noopener" class="modal-btn secondary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Directions
      </a>
    `;

    modalOverlay.classList.add('active');
    modalPanel.classList.add('active');
    document.body.style.overflow = 'hidden';
  };

  window.closeModal = function(){
    modalOverlay.classList.remove('active');
    modalPanel.classList.remove('active');
    document.body.style.overflow = '';
  };

  // Close modal on Escape
  document.addEventListener('keydown', e=>{
    if(e.key==='Escape') closeModal();
  });

  // Back button on browser history
  window.addEventListener('popstate', ()=>{
    if(modalPanel.classList.contains('active')){
      closeModal();
    } else if(currentCategory){
      showLanding();
    }
  });

})();
</script>
</body>
</html>
